<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Setlist Studio V5.2 - Split View</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #2563eb; --accent: #f59e0b; --danger: #ef4444; --text-main: #000000; --text-sub: #64748b; }
        
        html, body { height: 100%; margin: 0; overflow: hidden; position: fixed; width: 100%; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
        
        header { background: #1e293b; color: white; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        header h1 { font-size: 0.9rem; margin: 0; }

        /* 上下分割のメインコンテナ */
        .main-container { display: flex; flex: 1; flex-direction: column; overflow: hidden; padding: 5px; gap: 5px; }
        
        /* パソコン等の広い画面では横並びに戻す */
        @media (min-width: 768px) { .main-container { flex-direction: row; padding: 15px; gap: 15px; } }

        .column { 
            background: #e2e8f0; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            flex: 1; /* 上下均等に分ける */
            min-height: 0; 
            border: 1px solid #cbd5e1; 
            overflow: hidden;
        }
        
        .col-header { background: #cbd5e1; padding: 6px 10px; font-weight: bold; font-size: 0.8rem; flex-shrink: 0; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 5px; -webkit-overflow-scrolling: touch; }

        .song-card { background: white; padding: 8px; margin-bottom: 5px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; align-items: center; font-size: 0.9rem; }
        .song-card.is-skipped { opacity: 0.5; background: #f1f5f9; }

        .skip-zone { width: 25px; margin-right: 5px; border-right: 1px solid #eee; }
        .song-main-info { flex: 1; min-width: 0; }
        .song-title-row { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-sub-row { font-size: 0.7rem; color: var(--text-sub); }
        
        #trash-can { background: #fee2e2; border: 1px dashed var(--danger); color: var(--danger); text-align: center; padding: 5px; margin: 2px 5px; border-radius: 4px; font-size: 0.7rem; }

        .backup-zone { background: #cbd5e1; padding: 4px; display: flex; gap: 4px; justify-content: center; }
        .btn-backup { font-size: 0.6rem; padding: 2px 8px; }

        /* 入力フォームをスリムに */
        .add-form { background: white; padding: 8px; border-top: 1px solid #ccc; display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 4px; }
        .add-form input { padding: 6px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .add-form input[id="new-name"] { grid-column: span 3; }
        .btn-add { grid-column: span 3; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 4px; font-weight: bold; font-size: 0.9rem; }

        .footer-bar { background: #1e293b; color: white; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; flex-shrink: 0; }

        @media print { .no-print { display: none !important; } .print-area { display: block !important; } }
    </style>
</head>
<body>

<header class="no-print">
    <h1>🎸 SETLIST V5.2</h1>
    <div style="display: flex; align-items: center; gap: 8px;">
        <input type="number" id="limit-min" style="width: 40px; padding: 3px;" value="30" onchange="updateTotal()">
        <button onclick="window.print()" style="background:#22c55e; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:0.8rem;">印刷</button>
    </div>
</header>

<div class="main-container no-print">
    <div class="column">
        <div class="col-header">📂 マスター</div>
        <div id="master-list" class="scroll-area"></div>
        <div id="trash-can">🗑️ ドラッグで削除</div>
        <div class="backup-zone">
            <button class="btn-backup" onclick="exportData()">📤 保存</button>
            <button class="btn-backup" onclick="document.getElementById('file-input').click()">📥 復元</button>
            <input type="file" id="file-input" style="display:none" onchange="importData(event)">
        </div>
        <div class="add-form">
            <input type="text" id="new-name" placeholder="曲名">
            <input type="text" id="new-album" placeholder="アルバム">
            <input type="text" id="new-time" placeholder="分:秒">
            <input type="number" id="new-bpm" placeholder="BPM">
            <button class="btn-add" onclick="addNewToMaster()">＋ マスターに追加</button>
        </div>
    </div>

    <div class="column" style="background: #cbd5e1;">
        <div class="col-header">📝 本日のセットリスト</div>
        <div id="setlist-area" class="scroll-area"></div>
    </div>
</div>

<div class="footer-bar no-print">
    <div id="total-display">00:00 / 30:00</div>
    <div id="alert" style="color: #fda4af; font-weight:bold; display:none;">⚠️</div>
</div>

<div id="print-view" class="print-area" style="display:none;"></div>

<script>
    let masterSongs = JSON.parse(localStorage.getItem('master_songs_v5_2')) || [];
    const masterEl = document.getElementById('master-list');
    const setlistEl = document.getElementById('setlist-area');

    const config = { group: 'shared', animation: 150, filter: '.skip-toggle', preventOnFilter: false };
    new Sortable(masterEl, { ...config, onEnd: (evt) => { if (evt.to === document.getElementById('trash-can')) { masterSongs.splice(evt.oldIndex, 1); saveAndRender(); } } });
    new Sortable(setlistEl, { ...config, onAdd: updateTotal, onUpdate: updateTotal, onRemove: updateTotal });
    new Sortable(document.getElementById('trash-can'), { group: 'shared', onAdd: (evt) => { evt.item.remove(); updateTotal(); } });

    setlistEl.addEventListener('dblclick', (e) => {
        const item = e.target.closest('.song-card');
        if (item && !e.target.classList.contains('skip-toggle')) { item.remove(); updateTotal(); }
    });

    function addNewToMaster() {
        const name = document.getElementById('new-name').value;
        if(!name) return;
        const timeVal = document.getElementById('new-time').value || "0:00";
        const parts = timeVal.split(':');
        const seconds = (parseInt(parts[0] || 0) * 60) + parseInt(parts[1] || 0);
        masterSongs.push({ id: Date.now().toString(), name, album: document.getElementById('new-album').value || '-', time: timeVal, seconds, bpm: document.getElementById('new-bpm').value, isSkip: false });
        saveAndRender();
        ['new-name', 'new-album', 'new-time', 'new-bpm'].forEach(id => document.getElementById(id).value = "");
    }

    function saveAndRender() {
        localStorage.setItem('master_songs_v5_2', JSON.stringify(masterSongs));
        masterEl.innerHTML = '';
        masterSongs.forEach(s => masterEl.appendChild(createSongCard(s)));
    }

    function createSongCard(s) {
        const div = document.createElement('div');
        div.className = `song-card ${s.isSkip ? 'is-skipped' : ''}`;
        div.dataset.seconds = s.seconds; div.dataset.name = s.name; div.dataset.time = s.time; div.dataset.bpm = s.bpm; div.dataset.album = s.album;
        div.innerHTML = `
            <div class="skip-zone"><input type="checkbox" class="skip-toggle" ${s.isSkip ? 'checked' : ''} onchange="this.closest('.song-card').classList.toggle('is-skipped', this.checked); updateTotal();"></div>
            <div class="song-main-info"><div class="song-title-row">${s.name}</div><div class="song-sub-row">💿 ${s.album} (${s.time})</div></div>
            <div style="font-size:0.5rem; color:#888;">${s.bpm ? 'B' + s.bpm : ''}</div>
        `;
        return div;
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(masterSongs)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `setlist_backup.json`; a.click();
    }

    function importData(event) {
        const reader = new FileReader(); reader.onload = (e) => { masterSongs = JSON.parse(e.target.result); saveAndRender(); };
        reader.readAsText(event.target.files[0]);
    }

    function updateTotal() {
        let total = 0;
        setlistEl.querySelectorAll('.song-card').forEach(item => { total += parseInt(item.dataset.seconds); });
        const m = Math.floor(total / 60); const s = total % 60;
        const limitMin = document.getElementById('limit-min').value;
        document.getElementById('total-display').innerText = `${m}:${s.toString().padStart(2, '0')} / ${limitMin}:00`;
        document.getElementById('alert').style.display = total > (limitMin * 60) ? 'inline' : 'none';
    }

    saveAndRender();
</script>
</body>
</html>
