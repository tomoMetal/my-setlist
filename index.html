<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Setlist Studio V4.9 - Backup Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #2563eb; --accent: #f59e0b; --danger: #ef4444; --text-main: #000000; --text-sub: #64748b; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #1e293b; }
        header { background: #1e293b; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .main-container { display: flex; flex: 1; overflow: hidden; padding: 20px; gap: 20px; }
        
        .column { background: #e2e8f0; border-radius: 12px; display: flex; flex-direction: column; width: 50%; min-width: 350px; border: 2px solid #cbd5e1; }
        .col-header { padding: 15px; font-weight: bold; border-bottom: 2px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; min-height: 100px; }

        .song-card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: grab; display: flex; align-items: center; border: 1px solid transparent; transition: 0.1s; position: relative; user-select: none; }
        .song-card:active { cursor: grabbing; border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .skip-zone { display: flex; align-items: center; justify-content: center; width: 30px; margin-right: 15px; border-right: 1px solid #eee; padding-right: 10px; }
        .skip-toggle { transform: scale(1.1); cursor: pointer; }
        .song-card.is-skipped { background: #f8fafc; opacity: 0.8; }

        .song-main-info { flex: 1; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
        .song-title-row { display: flex; align-items: baseline; gap: 8px; font-size: 1.2rem; font-weight: bold; color: var(--text-main); }
        .song-time { font-weight: normal; font-size: 1rem; color: var(--text-main); }
        .song-sub-row { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; color: var(--text-sub); }
        
        .song-meta-info { display: flex; align-items: center; gap: 15px; justify-content: flex-end; width: 80px; margin-left: 10px; pointer-events: none; }
        .bpm-badge { font-size: 0.8rem; background: #eee; padding: 4px 8px; border-radius: 4px; color: var(--text-main); font-family: monospace; }

        #trash-can { background: #fee2e2; border: 2px dashed var(--danger); color: var(--danger); text-align: center; padding: 15px; margin: 10px 15px; border-radius: 8px; font-weight: bold; }

        .backup-zone { background: #cbd5e1; padding: 10px; display: flex; gap: 10px; justify-content: center; border-top: 1px solid #94a3b8; }

        .add-form { background: white; padding: 15px; border-top: 1px solid #ccc; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 8px; align-items: center;}
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .limit-input { width: 60px; padding: 5px; font-size: 1.1rem; border: 1px solid var(--primary); border-radius: 4px; text-align: center; }

        .footer-bar { background: #1e293b; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; }
        
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .btn-add { background: var(--primary); color: white; }
        .btn-print { background: #22c55e; color: white; }
        .btn-backup { background: #475569; color: white; font-size: 0.8rem; }

        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; font-size: 20pt; padding: 20px; color: black; background: white; }
            .print-header { border-bottom: 4px solid #000; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: baseline; }
            .print-item { border-bottom: 2px solid #ccc; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
            .print-song-name { font-size: 24pt; font-weight: bold; flex: 1; }
            .print-album-name { font-size: 16pt; font-weight: normal; margin-left: 10px; color: #444; }
            .print-song-meta { font-size: 16pt; color: #333; display: flex; gap: 20px; }
        }
    </style>
</head>
<body>

<header class="no-print">
    <div style="font-size: 1.5rem; font-weight: bold;">🎸 SETLIST STUDIO V4.9</div>
    <div>
        <span style="font-size: 0.9rem;">持ち時間:</span>
        <input type="number" id="limit-min" class="limit-input" value="30" onchange="updateTotal()">
        <span>分</span>
        <button class="btn btn-print" style="margin-left:20px;" onclick="window.print()">🖨️ 印刷用プレビュー</button>
    </div>
</header>

<div class="main-container no-print">
    <div class="column">
        <div class="col-header">📂 マスター (レパートリー)</div>
        <div id="master-list" class="scroll-area"></div>
        <div id="trash-can">🗑️ ドラッグで削除</div>
        
        <div class="backup-zone">
            <button class="btn btn-backup" onclick="exportData()">📤 曲リストを保存</button>
            <button class="btn btn-backup" onclick="document.getElementById('file-input').click()">📥 保存したリストを読み込む</button>
            <input type="file" id="file-input" style="display:none" onchange="importData(event)">
        </div>

        <div class="add-form">
            <input type="text" id="new-name" placeholder="曲名">
            <input type="text" id="new-album" placeholder="Album">
            <input type="text" id="new-time" placeholder="分:秒">
            <input type="number" id="new-bpm" placeholder="BPM">
            <div style="font-size: 0.7rem; text-align: center; color:#666;">No除外<br><input type="checkbox" id="new-skip" class="skip-toggle"></div>
            <button class="btn btn-add" onclick="addNewToMaster()">追加</button>
        </div>
    </div>

    <div class="column" style="background: #cbd5e1;">
        <div class="col-header">📝 本日のセットリスト</div>
        <div id="setlist-area" class="scroll-area"></div>
        <div style="padding:10px; text-align:center; font-size:0.8rem; color:#475569;">
            カードのどこでもドラッグOK / ダブルクリックで削除
        </div>
    </div>
</div>

<div class="footer-bar no-print">
    <div id="total-display">合計演奏時間: 00:00 / 30:00</div>
    <div id="alert" style="color: #fda4af; font-weight:bold; display:none;">⚠️ 時間オーバー！</div>
</div>

<div id="print-view" class="print-area" style="display:none;"></div>

<script>
    // --- データの初期化 ---
    let masterSongs = JSON.parse(localStorage.getItem('master_songs_v4_9')) || [];

    const masterEl = document.getElementById('master-list');
    const setlistEl = document.getElementById('setlist-area');
    const trashEl = document.getElementById('trash-can');

    // --- ドラッグ＆ドロップ設定 ---
    const sortableConfigMaster = {
        group: { name: 'shared', pull: 'clone', put: false },
        animation: 150,
        filter: '.skip-toggle',
        preventOnFilter: false,
        onEnd: (evt) => {
            if (evt.to === trashEl) { 
                const songId = evt.item.dataset.id;
                masterSongs = masterSongs.filter(s => s.id !== songId);
                saveMaster();
                renderMaster();
            }
        }
    };

    const sortableConfigSetlist = {
        group: 'shared',
        animation: 150,
        filter: '.skip-toggle',
        preventOnFilter: false,
        onAdd: () => updateTotal(),
        onUpdate: () => updateTotal(),
        onRemove: (evt) => {
            evt.item.remove();
            updateTotal();
        }
    };

    new Sortable(masterEl, sortableConfigMaster);
    new Sortable(setlistEl, sortableConfigSetlist);
    new Sortable(trashEl, { group: 'shared', onAdd: (evt) => { evt.item.remove(); updateTotal(); } });

    setlistEl.addEventListener('dblclick', (e) => {
        const item = e.target.closest('.song-card');
        if (item && !e.target.classList.contains('skip-toggle')) {
            item.remove(); updateTotal(); 
        }
    });

    // --- 曲の追加と保存 ---
    function addNewToMaster() {
        const name = document.getElementById('new-name').value;
        const album = document.getElementById('new-album').value || 'Other';
        const timeVal = document.getElementById('new-time').value || "0:00";
        const bpm = document.getElementById('new-bpm').value;
        const isSkip = document.getElementById('new-skip').checked;
        if(!name) return;
        const parts = timeVal.split(':');
        const seconds = (parseInt(parts[0] || 0) * 60) + parseInt(parts[1] || 0);
        
        masterSongs.push({ id: Date.now().toString(), name, album, time: timeVal, seconds, bpm, isSkip });
        saveMaster();
        renderMaster();

        ['new-name', 'new-album', 'new-time', 'new-bpm'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('new-skip').checked = false;
    }

    function saveMaster() {
        localStorage.setItem('master_songs_v4_9', JSON.stringify(masterSongs));
    }

    function renderMaster() {
        masterEl.innerHTML = '';
        masterSongs.forEach(s => masterEl.appendChild(createSongCard(s)));
    }

    // --- データのエクスポート（保存） ---
    function exportData() {
        const dataStr = JSON.stringify(masterSongs, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `setlist_master_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    // --- インポート（読み込み） ---
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (Array.isArray(imported)) {
                    if(confirm('現在のマスターリストを上書きしてもよろしいですか？')) {
                        masterSongs = imported;
                        saveMaster();
                        renderMaster();
                        alert('読み込みが完了しました！');
                    }
                }
            } catch (err) {
                alert('ファイルの読み込みに失敗しました。');
            }
        };
        reader.readAsText(file);
    }

    function createSongCard(s) {
        const div = document.createElement('div');
        div.className = `song-card ${s.isSkip ? 'is-skipped' : ''}`;
        div.dataset.id = s.id;
        div.dataset.seconds = s.seconds;
        div.dataset.name = s.name;
        div.dataset.time = s.time;
        div.dataset.bpm = s.bpm;
        div.dataset.album = s.album;
        div.innerHTML = `
            <div class="skip-zone no-print"><input type="checkbox" class="skip-toggle" ${s.isSkip ? 'checked' : ''} onchange="toggleSkip(this)"></div>
            <div class="song-main-info">
                <div class="song-title-row"><span class="song-title">${s.name}</span><span class="song-time">(${s.time})</span></div>
                <div class="song-sub-row"><span>💿</span><span>${s.album}</span></div>
            </div>
            <div class="song-meta-info">${s.bpm ? `<div class="bpm-badge">BPM:${s.bpm}</div>` : ''}</div>
        `;
        return div;
    }

    function toggleSkip(checkbox) {
        const card = checkbox.closest('.song-card');
        const songId = card.dataset.id;
        const song = masterSongs.find(s => s.id === songId);
        if (song) {
            song.isSkip = checkbox.checked;
            card.classList.toggle('is-skipped', checkbox.checked);
            saveMaster();
            updateTotal();
        }
    }

    function updateTotal() {
        let total = 0;
        let songCounter = 1;
        const limitMin = parseInt(document.getElementById('limit-min').value) || 30;
        const items = setlistEl.querySelectorAll('.song-card');
        const printView = document.getElementById('print-view');
        printView.innerHTML = `<div class="print-header"><span>SETLIST</span><span style="font-size: 16pt;">Limit: ${limitMin}:00</span></div>`;

        items.forEach((item) => {
            total += parseInt(item.dataset.seconds);
            const isSkip = item.querySelector('.skip-toggle').checked;
            let displayNameHTML = `<span class="print-song-name">${isSkip ? '' : songCounter + '. '}${item.dataset.name}</span><span class="print-album-name">（${item.dataset.album}）</span>`;
            if (!isSkip) songCounter++;

            const p = document.createElement('div');
            p.className = 'print-item';
            p.innerHTML = `<div style="flex:1;">${displayNameHTML}</div><div class="print-song-meta"><span>${item.dataset.time}</span><span style="min-width: 80px; text-align: right;">${item.dataset.bpm ? 'BPM '+item.dataset.bpm : ''}</span></div>`;
            printView.appendChild(p);
        });

        const m = Math.floor(total / 60);
        const s = total % 60;
        document.getElementById('total-display').innerText = `合計演奏時間: ${m}:${s.toString().padStart(2, '0')} / ${limitMin}:00`;
        document.getElementById('alert').style.display = total > (limitMin * 60) ? 'block' : 'none';
    }

    renderMaster();
</script>
</body>
</html>
